# nginx serving the built SPA and reverse-proxying /api to the Baseline backend.
# BACKEND_URL is substituted at container start (envsubst) so the same image
# works in any environment — defaults to the in-cluster Baseline Service.
#
# The frontend calls /api/<path>; the backend mounts its routes at /v1/<path>.
# We rewrite the /api prefix to /v1 here (mirroring the Vite dev proxy). Identity
# rides on the X-Baseline-Principal header set by the browser client — there are
# no cookies to forward (header auth, not sessions).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API → Baseline Service, rewriting /api → /v1.
    location /api/ {
        rewrite ^/api/(.*)$ /v1/$1 break;
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health probes are served at the backend root (outside /v1).
    location = /readyz {
        proxy_pass ${BACKEND_URL}/readyz;
        proxy_set_header Host $host;
    }
    location = /healthz {
        proxy_pass ${BACKEND_URL}/healthz;
        proxy_set_header Host $host;
    }

    # SPA: serve static assets, fall back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built, hashed assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
