{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "baseline.secretName" . }}
  labels:
    {{- include "baseline.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "baseline.postgresDSN" . | quote }}
  {{- if .Values.mem0.enabled }}
  MEM0_URL: {{ .Values.mem0.url | quote }}
  {{- end }}
{{- end }}
