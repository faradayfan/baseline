# Base values (development defaults). Environment overlays live in
# deploy/<env>/values.yaml and override these.

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  registry: ""          # empty for local; Pi overlay sets the in-cluster registry
  repository: baseline   # bare repo → gets the registry prefixed (see _helpers)
  tag: "dev"
  pullPolicy: IfNotPresent

# memorySource selects the memory backend: none (standards-only) | mem0.
memorySource: none

# Extra plain env vars for the server (non-secret).
env: {}

service:
  type: LoadBalancer
  port: 8080
  annotations: {}        # Pi overlay adds the MetalLB loadBalancerIPs annotation

# Read-only dashboard (a separate nginx-served Vite SPA). Disabled by default;
# the local overlay enables it. It proxies /api -> the in-cluster Baseline
# Service and is read-only over the GET endpoints. Identity is the spoofable
# X-Baseline-Principal "view as" header — NOT real auth (single-user POC).
ui:
  enabled: false
  image:
    registry: ""              # empty for local; an overlay sets the registry
    repository: baseline-ui
    tag: "dev"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP           # local overlay flips to LoadBalancer (localhost:8081)
    port: 80
    annotations: {}
  resources:
    requests: { cpu: 20m, memory: 32Mi }
    limits: { cpu: 200m, memory: 128Mi }

probes:
  initialDelay: 5

# Distroless nonroot (uid 65532), read-only root, no extra caps — matches the
# cluster security convention.
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits: { cpu: 500m, memory: 256Mi }

# Postgres via the Bitnami postgresql subchart (aliased "postgres"). The image is
# a custom build (deploy/postgres/Dockerfile) = Bitnami base + pgvector, so the
# subchart's NFS/volume-permissions handling works AND `CREATE EXTENSION vector`
# is available. Overlays set image.registry/repository/tag to the cluster build.
postgres:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql   # dev fallback (no pgvector); overlays point at the custom image
    tag: "16"
  # The custom/legacy images aren't Bitnami-signed; skip the signature check.
  global:
    security:
      allowInsecureImages: true
  auth:
    username: baseline
    password: baseline       # dev default; prod supplies secrets.existingSecret
    database: baseline
    postgresPassword: postgres
  primary:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: "1", memory: 512Mi }
    # Create the pgvector extension at init time. CREATE EXTENSION requires
    # superuser, but Bitnami runs *.sql initdb scripts as the (non-super) app
    # user POSTGRESQL_USERNAME — so a .sql script fails with 42501. A *.sh script
    # can instead connect explicitly as the `postgres` superuser via
    # POSTGRES_PASSWORD. The app's `CREATE EXTENSION IF NOT EXISTS vector`
    # (migration 00001) then no-ops. (Confirmed: bitnami/containers#30065.)
    initdb:
      scripts:
        00-pgvector.sh: |
          #!/bin/bash
          set -e
          # Bitnami exposes POSTGRESQL_* vars (POSTGRESQL_POSTGRES_PASSWORD is the
          # superuser password; POSTGRESQL_DATABASE is the app DB). Connect as the
          # postgres superuser to create the extension in the app database.
          PGPASSWORD="$POSTGRESQL_POSTGRES_PASSWORD" psql -v ON_ERROR_STOP=1 \
            --username postgres --dbname "$POSTGRESQL_DATABASE" \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

# Staleness reaper as a CronJob (active facts past valid_to → expired).
reaper:
  enabled: true
  schedule: "*/15 * * * *"
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 200m, memory: 128Mi }

# Mem0 memory backend (Phase 2). Disabled by default so Phase-1 deploys stay
# facts-only. When enabled, the chart deploys Ollama (LLM + embedder, no vendor
# keys), Mem0's pgvector Postgres, Neo4j, and the Mem0 API server; Baseline's
# MEMORY_SOURCE is set to mem0 and MEM0_URL points at the in-cluster Service.
mem0:
  enabled: false

  # The Mem0 admin API key Baseline authenticates with, and Mem0's JWT secret.
  # Overlays/secrets supply real values; these are dev placeholders.
  apiKey: "dev-mem0-admin-key"
  jwtSecret: "dev-jwt-secret-change-me"

  # OpenAI key for Mem0's LLM + embedder. Self-hosted Ollama was tried first but
  # is too slow/weak on Pi CPU (1b/3b models produced invalid JSON, ~76s/call),
  # so Mem0 uses OpenAI (the stock image's default). Supplied via secrets.
  openaiApiKey: ""

  # Override the Ollama endpoint Mem0 uses. Empty → the in-cluster ollama service
  # (when mem0.ollama.enabled). Set to an external URL to use Ollama running
  # elsewhere — e.g. http://host.docker.internal:11434 for native Ollama on a
  # Docker Desktop Mac (GPU-accelerated; the local overlay uses this).
  ollamaBaseURL: ""

  # Pin heavy workloads to a roomy node (only Neo4j now that Ollama is off).
  nodeSelector: {}

  api:
    # Stock image: defaults to OpenAI (gpt-4o LLM + text-embedding-3-small),
    # reading OPENAI_API_KEY. No custom image needed on the OpenAI path.
    image: mem0/mem0-api-server:latest
    pullPolicy: IfNotPresent
    env: {}
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: "1", memory: 1Gi }

  # Local Ollama for fully self-hosted models. DISABLED — too slow/weak on Pi CPU
  # for Mem0's JSON extraction; we use OpenAI instead. Kept for future GPU nodes.
  ollama:
    enabled: false
    image: ollama/ollama:latest
    llmModel: "qwen2.5:3b"
    embedModel: "nomic-embed-text"
    persistence:
      storageClass: ""
      size: 10Gi
    resources:
      requests: { cpu: 250m, memory: 2Gi }
      limits: { cpu: "3", memory: 4Gi }

  postgres:
    # Reuse the custom Bitnami+pgvector image (overlays set the registry path).
    image: pgvector/pgvector:pg16
    user: mem0
    password: mem0
    database: mem0
    postgresPassword: postgres
    persistence:
      storageClass: ""
      size: 2Gi
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: "1", memory: 512Mi }

  neo4j:
    enabled: true
    image: neo4j:5
    password: mem0graph
    heap: "512m"
    pagecache: "256m"
    nodeSelector: {}
    persistence:
      storageClass: ""
      size: 5Gi
    resources:
      requests: { cpu: 100m, memory: 512Mi }
      limits: { cpu: "1", memory: 1536Mi }

secrets:
  existingSecret: ""      # prod: name of a pre-created Secret with DATABASE_URL
