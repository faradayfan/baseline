# Raspberry Pi / k3s (ARM) cluster overlay — an EXAMPLE remote deployment.
# Replace the placeholders below with your own cluster's values:
#   - <REGISTRY_HOST>  an in-cluster (or external) image registry host/IP. If it's
#     a plain-HTTP registry, `docker login <REGISTRY_HOST>:5000` once and add it to
#     Docker's "insecure-registries".
#   - <BASELINE_LB_IP> the LoadBalancer IP to pin for the Baseline service (e.g.
#     from a MetalLB pool <METALLB_POOL>).
#   - kube-context: k3s · storageClass: nfs-client (adjust to your cluster).
#
# image.tag is supplied at deploy time as the git short SHA (--set-string image.tag=...).

image:
  registry: <REGISTRY_HOST>:5000
  repository: baseline
  pullPolicy: IfNotPresent

memorySource: mem0      # Phase 2: read personal memories from the in-cluster Mem0.

# embedder deliberately UNSET on the Pi: there is no fast local Ollama here (Mem0
# uses the OpenAI API for the same reason). Baseline therefore runs without a fact
# embedder — /facts?q= falls back to substring.
#
# To enable semantic search here you'd most likely use the OpenAI API (as Mem0
# does), but the embed client only speaks the OLLAMA wire format today — OpenAI is
# NOT yet supported (see internal/embed/embed.go). It needs a small provider
# adapter: OpenAI uses POST /v1/embeddings, bearer auth, an `input` field, a
# `data[].embedding` response envelope, and 1536-dim vectors by default (request
# `dimensions: 768` to fit the fixed facts.embedding vector(768) column). Until
# that adapter exists, point embedder.url only at an Ollama-compatible endpoint.

service:
  type: LoadBalancer
  port: 8080
  annotations:
    metallb.universe.tf/loadBalancerIPs: <BASELINE_LB_IP>

# ARM-sized resources for the Pi nodes.
resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits: { cpu: 500m, memory: 256Mi }

postgres:
  # Custom Bitnami+pgvector image built from deploy/postgres/Dockerfile and pushed
  # to the in-cluster registry (make pi-pg-image). The registry host has a "." so
  # the subchart uses it verbatim.
  image:
    registry: <REGISTRY_HOST>:5000
    repository: baseline-postgresql
    tag: "16-pgvector"
  primary:
    persistence:
      storageClass: nfs-client
      size: 5Gi
    resources:
      requests: { cpu: 100m, memory: 192Mi }
      limits: { cpu: "1", memory: 512Mi }

reaper:
  enabled: true
  schedule: "*/15 * * * *"

# Phase 2: Mem0 stack (Ollama LLM+embedder, pgvector, Neo4j) on the cluster.
mem0:
  enabled: true

  # Real secrets come from deploy/pi/secrets.yaml (gitignored). Placeholders here.
  apiKey: "pi-mem0-admin-key"
  jwtSecret: "pi-jwt-secret"

  # Pin the heavy model + graph workloads to the 8GB node.
  nodeSelector:
    kubernetes.io/hostname: k8s-worker-04

  api:
    # Custom image (OpenAI default) = stock mem0-api + the psycopg/neo4j drivers
    # the stock image is missing for its own pgvector/neo4j stores.
    # OPENAI_API_KEY comes from secrets.yaml.
    image: <REGISTRY_HOST>:5000/baseline-mem0-api:openai
    pullPolicy: Always

  # Disabled: Pi CPU too slow/weak for self-hosted LLM extraction. Using OpenAI.
  ollama:
    enabled: false

  postgres:
    # Custom Bitnami+pgvector image in the in-cluster registry.
    image: <REGISTRY_HOST>:5000/baseline-postgresql:16-pgvector
    persistence:
      storageClass: nfs-client
      size: 2Gi

  neo4j:
    enabled: true
    persistence:
      storageClass: nfs-client
      size: 5Gi
