name: Release Please

# On every push to main, release-please maintains a release PR (changelog +
# version bump from Conventional Commits). When that PR merges, it cuts a GitHub
# Release + tag, and the publish job builds and ships the artifacts:
#   - multi-arch container images → GHCR
#   - cross-compiled binaries     → the GitHub Release
#   - the Helm chart (OCI)        → GHCR
#
# CI (ci.yml) has already passed by the time anything lands on main (required
# checks gate the PR merge), so publish does not re-run the test suite.
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + tag
      pull-requests: write # maintain the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish artifacts
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write # upload binaries to the Release
      packages: write # push images + chart to GHCR
    env:
      VERSION: ${{ needs.release-please.outputs.version }} # 0.2.0
      TAG: ${{ needs.release-please.outputs.tag_name }} # v0.2.0
      REGISTRY: ghcr.io/${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - uses: docker/setup-qemu-action@v3 # arm64 emulation for multi-arch
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- (a) multi-arch images → GHCR (version + a stable moving tag) -------
      - name: Push service image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/baseline:${{ env.VERSION }}
            ${{ env.REGISTRY }}/baseline:latest

      - name: Push UI image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/baseline-ui:${{ env.VERSION }}
            ${{ env.REGISTRY }}/baseline-ui:latest

      - name: Push Postgres image
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/postgres
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/baseline-postgresql:${{ env.VERSION }}
            ${{ env.REGISTRY }}/baseline-postgresql:16-pgvector

      - name: Push mem0-api image
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/mem0-api
          build-args: PATCH_OLLAMA=1
          # amd64-only: the mem0/mem0-api-server base ships no arm64 manifest.
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/baseline-mem0-api:${{ env.VERSION }}
            ${{ env.REGISTRY }}/baseline-mem0-api:ollama

      # --- (b) cross-compiled binaries → the GitHub Release ------------------
      - name: Build binaries
        run: |
          mkdir -p dist
          build() { # build <cmd> <goos> <goarch>
            GOOS="$2" GOARCH="$3" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/$1-$2-$3" "./cmd/$1"
          }
          for arch in amd64 arm64; do
            build baseline linux "$arch"
            build baseline-mcp linux "$arch"
          done
          # baseline-mcp is a dev/ops tool — also ship a native-Mac build.
          build baseline-mcp darwin arm64

      - name: Upload binaries to the Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*

      # --- (c) Helm chart (OCI) → GHCR ---------------------------------------
      - uses: azure/setup-helm@v4
        with:
          version: "3.16.4"
      - name: Package + push chart
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build deploy/charts/baseline
          helm package deploy/charts/baseline \
            --version "$VERSION" --app-version "$VERSION"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push "baseline-${VERSION}.tgz" "oci://${REGISTRY}/charts"
