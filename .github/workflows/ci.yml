name: CI

# Build, vet, and test on every push and PR. This is the CI the project's own
# governance facts assert ("All production deploys must go through CI", "Run the
# test suite before committing") — now actually enforced.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---- Go service: build + vet + FULL test suite (unit + integration + §14
  # conformance). The integration/conformance tests spin up a pgvector container
  # via testcontainers; GitHub-hosted Ubuntu runners ship Docker, so this works
  # with no extra services. Tests gate integration behind testing.Short(), so a
  # plain `go test ./...` runs everything. -------------------------------------
  go:
    name: Go (build · vet · full test suite)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin to the asdf-pinned toolchain (.tool-versions / go.mod: 1.26.4).
          go-version: "1.26.4"
          check-latest: false
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (full suite — needs Docker for the pgvector testcontainer)
        # Not -short: run unit + integration + conformance. Docker is present on
        # the runner; testcontainers manages the pgvector container lifecycle.
        run: go test ./...

  # ---- Frontend dashboard: typecheck + production build. -----------------------
  frontend:
    name: Frontend (typecheck · build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Use pnpm 11 to match local dev. frontend/pnpm-workspace.yaml declares
          # `allowBuilds: esbuild` (a pnpm-11 feature, needed so esbuild's
          # postinstall runs); under pnpm 9 that file is read as a strict workspace
          # manifest and fails with "packages field missing or empty". The v9
          # lockfile is forward-compatible — pnpm 11 reads it fine.
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        # `build` is `tsc -b && vite build` — compiles and produces the dist bundle.
        run: pnpm run build

  # ---- Helm chart: lint + template render (catches chart regressions). ---------
  helm:
    name: Helm (lint · template)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          # Match the pinned helm in .tool-versions.
          version: "3.16.4"

      - name: Build chart dependencies
        # The Bitnami postgresql subchart is gitignored (vendored locally, not in
        # the repo), so a fresh CI checkout must fetch it before lint/template —
        # mirrors the Makefile's `helm-deps`. Without it, `helm template` errors:
        # "missing in charts/ directory: postgresql". The repo must be registered
        # first (a fresh runner has no repos), then `dependency build` resolves it.
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency build deploy/charts/baseline

      - name: Lint chart
        run: helm lint deploy/charts/baseline

      - name: Template render (smoke — fails on bad templates/values)
        run: helm template baseline deploy/charts/baseline > /dev/null

  # ---- Go formatting: gofmt must be clean. Separate from lint so a formatting
  # nit gives a clear, fast signal. -------------------------------------------
  format:
    name: Format (gofmt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true
      - name: gofmt
        # Print offenders then fail if any file is unformatted.
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"
            exit 1
          fi

  # ---- Go lint: golangci-lint v2 (config in .golangci.yml). Blocking — the
  # codebase is lint-clean against the enabled set. -----------------------------
  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # v2.x is the line that supports Go 1.26 (verified locally at v2.12.x).
          version: v2.1.6
          args: --timeout=5m

  # ---- Security scanning: the org guardrails require lint+format+security on
  # every pipeline, and grype-based dependency scanning specifically. ----------
  security:
    name: Security (govulncheck · grype · gosec)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      # Go vuln DB: only flags vulns reachable in the call graph — low noise, so
      # it is BLOCKING.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # grype: scan the source tree's dependencies. Fail on High+Critical.
      # (The same tool scans built images in the `build` job.)
      - name: grype (dependencies)
        uses: anchore/scan-action@v4
        with:
          path: "."
          severity-cutoff: high
          fail-build: true
          output-format: table

      # gosec SAST: NON-BLOCKING on day 1 (-no-fail) to avoid a wall of findings
      # gating merges. Triage, then drop -no-fail to make it blocking.
      - name: gosec (SAST, non-blocking)
        uses: securego/gosec@master
        with:
          args: -severity high -confidence high -no-fail ./...

  # ---- Build: prove both binaries and all four images compile on every PR.
  # Single-arch (amd64) + load locally so grype can scan the first-party images.
  # NO push here — release publishing (multi-arch → GHCR) lives in
  # release-please.yml. ------------------------------------------------------
  build:
    name: Build (binaries · images · image scan)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Build binaries
        run: |
          go build -o /dev/null ./cmd/baseline
          go build -o /dev/null ./cmd/baseline-mcp

      - uses: docker/setup-buildx-action@v3

      - name: Build service image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: baseline:ci

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          push: false
          tags: baseline-ui:ci

      - name: Build Postgres image
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/postgres
          load: true
          push: false
          tags: baseline-postgresql:ci

      - name: Build mem0-api image
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/mem0-api
          build-args: PATCH_OLLAMA=1
          load: true
          push: false
          tags: baseline-mem0-api:ci

      # grype the first-party images (service + UI). The postgres/mem0 images are
      # third-party bases we don't control — scanning them on every PR is noise.
      - name: grype service image
        uses: anchore/scan-action@v4
        with:
          image: "baseline:ci"
          severity-cutoff: high
          fail-build: true
      - name: grype UI image
        uses: anchore/scan-action@v4
        with:
          image: "baseline-ui:ci"
          severity-cutoff: high
          fail-build: true
